services:
  postgres:
    image: postgres:17
    container_name: admin-platform-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-admin_platform}
      POSTGRES_USER: ${POSTGRES_USER:-admin_platform}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin_platform}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin_platform} -d ${POSTGRES_DB:-admin_platform}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: admin-platform-redis
    ports:
      - "8379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  rustfs:
    image: rustfs/rustfs:latest
    container_name: admin-platform-rustfs
    command: /data
    environment:
      RUSTFS_ADDRESS: ":9000"
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-rustfsadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./data/rustfs:/data
      - ./logs/rustfs:/logs
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
